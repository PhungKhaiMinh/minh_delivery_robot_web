# Ví dụ thêm vào Mosquitto trên VPS — BẮT BUỘC chỉnh đường dẫn cert và cổng cho đúng máy bạn.
# Sao chép các khối listener phù hợp vào mosquitto.conf chính, rồi: sudo systemctl restart mosquitto

# MQTT TCP (robot / Python — thường đã có)
listener 1883
protocol mqtt
# password_file /etc/mosquitto/passwd
# allow_anonymous false

# WebSocket KHÔNG TLS — chỉ dùng khi web chạy HTTP (localhost)
listener 9001
protocol websockets

# WebSocket CÓ TLS — dùng cho trang HTTPS (Vercel). Đổi 8884 nếu trùng cổng khác.
listener 8884
protocol websockets
# Đường dẫn chứng chỉ (ví dụ Let's Encrypt hoặc tự ký)
# cafile /etc/letsencrypt/live/example.com/chain.pem
# certfile /etc/letsencrypt/live/example.com/cert.pem
# keyfile /etc/letsencrypt/live/example.com/privkey.pem
