<!-- Top Bar Component (mobile header + desktop header) -->
<header class="sticky top-0 z-30 bg-white/80 backdrop-blur-lg border-b border-gray-200">
    <div class="flex items-center justify-between px-4 lg:px-8 py-3">
        <!-- Mobile menu button -->
        <button 
            @click="sidebarOpen = true"
            class="lg:hidden p-2 -ml-2 text-gray-600 hover:bg-gray-100 rounded-xl"
        >
            <i data-lucide="menu" class="w-5 h-5"></i>
        </button>
        
        <!-- Page Title -->
        <div class="hidden lg:block">
            <h2 class="text-lg font-bold text-gray-900">{% block page_title %}Tổng quan{% endblock %}</h2>
            <p class="text-xs text-gray-500">{% block page_subtitle %}{{ current_date }}{% endblock %}</p>
        </div>
        
        <!-- Mobile center title -->
        <h2 class="lg:hidden text-base font-bold text-gray-900">{% block mobile_title %}BK BookBot{% endblock %}</h2>
        
        <!-- Right actions -->
        <div class="flex items-center gap-3">
            <!-- System Status -->
            <div class="hidden sm:flex items-center gap-2 px-3 py-1.5 bg-green-50 text-green-600 rounded-lg text-xs font-medium">
                <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span>
                Hệ thống hoạt động
            </div>
            
            <!-- User Avatar -->
            <div class="w-9 h-9 bg-primary-100 text-primary-600 rounded-xl flex items-center justify-center text-sm font-bold cursor-pointer hover:bg-primary-200 transition-colors">
                {{ user.name[0] | upper if user else 'U' }}
            </div>
        </div>
    </div>
</header>
